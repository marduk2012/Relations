<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" width="920" height="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Canvas background -->
  <rect width="920" height="460" fill="#15161a"/>

  <!-- === EDGES (drawn first so nodes overlay) === -->

  <!-- Arthur ↔ Lancelot : ally, solid green -->
  <path d="M460 230 Q380 150 280 130" stroke="#4ade80" stroke-width="2.5" fill="none" opacity="0.85"/>

  <!-- Arthur ↔ Merlin : mentor (asymmetric, dotted purple) -->
  <path d="M460 230 Q300 240 200 280" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-dasharray="2 6" opacity="0.85"/>
  <polygon points="200,280 212,272 213,283" fill="#a78bfa"/>

  <!-- Arthur ↔ Morgana : enemy, solid red -->
  <path d="M460 230 Q540 320 660 360" stroke="#ef4444" stroke-width="2.5" fill="none" opacity="0.85"/>

  <!-- Arthur ↔ Mordred : enemy, solid red -->
  <path d="M460 230 Q420 320 360 360" stroke="#ef4444" stroke-width="2.5" fill="none" opacity="0.85"/>

  <!-- Lancelot ↔ Guinevere : lover, dashed pink -->
  <path d="M280 130 Q440 100 600 230" stroke="#f472b6" stroke-width="2.5" fill="none" stroke-dasharray="8 4" opacity="0.85"/>

  <!-- Lancelot → Galahad : parent, solid amber, with arrow -->
  <path d="M280 130 Q220 95 165 82" stroke="#fbbf24" stroke-width="2.5" fill="none" opacity="0.85"/>
  <polygon points="160,80 172,75 170,86" fill="#fbbf24"/>

  <!-- Arthur ↔ Gawain : ally, solid green -->
  <path d="M460 230 Q620 150 760 120" stroke="#4ade80" stroke-width="2.5" fill="none" opacity="0.85"/>

  <!-- Arthur ↔ Guinevere : spouse double-line. Drawn LAST so node circles cover endpoints cleanly. -->
  <line x1="500" y1="227" x2="568" y2="227" stroke="#ec4899" stroke-width="1.5"/>
  <line x1="500" y1="233" x2="568" y2="233" stroke="#ec4899" stroke-width="1.5"/>

  <!-- === NODES === -->
  <!-- Arthur (center, highlighted with bigger ring) -->
  <circle cx="460" cy="230" r="42" fill="#3a5a7d" stroke="#7f6df2" stroke-width="3.5"/>
  <path d="M433,210 L443,196 L453,206 L460,194 L467,206 L477,196 L487,210 L487,217 L433,217 Z" fill="#fbbf24" stroke="#92400e" stroke-width="0.8"/>
  <rect x="430" y="282" width="60" height="20" rx="4" fill="#0e0f12" stroke="#363636" stroke-width="0.6"/>
  <text x="460" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#dcddde">Arthur</text>

  <!-- Guinevere -->
  <circle cx="600" cy="230" r="32" fill="#7c3a5a" stroke="#363636" stroke-width="2"/>
  <path d="M580,225 Q580,210 600,208 Q620,210 620,225 L618,250 L582,250 Z" fill="#fbbf24" opacity="0.85"/>
  <rect x="567" y="277" width="66" height="20" rx="4" fill="#0e0f12" stroke="#363636" stroke-width="0.6"/>
  <text x="600" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#dcddde">Guinevere</text>

  <!-- Lancelot -->
  <circle cx="280" cy="130" r="32" fill="#4a6275" stroke="#363636" stroke-width="2"/>
  <path d="M260,140 Q260,118 280,118 Q300,118 300,140 L300,148 L260,148 Z" fill="#94a3b8"/>
  <rect x="252" y="177" width="56" height="20" rx="4" fill="#0e0f12" stroke="#363636" stroke-width="0.6"/>
  <text x="280" y="191" text-anchor="middle" font-size="13" font-weight="600" fill="#dcddde">Lancelot</text>

  <!-- Galahad -->
  <circle cx="160" cy="80" r="28" fill="#637888" stroke="#363636" stroke-width="2"/>
  <ellipse cx="160" cy="55" rx="18" ry="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="135" y="123" width="50" height="20" rx="4" fill="#0e0f12" stroke="#363636" stroke-width="0.6"/>
  <text x="160" y="137" text-anchor="middle" font-size="13" font-weight="600" fill="#dcddde">Galahad</text>

  <!-- Merlin -->
  <circle cx="200" cy="280" r="32" fill="#5a447c" stroke="#363636" stroke-width="2"/>
  <path d="M183,272 L200,243 L217,272 Z" fill="#a78bfa" stroke="#312e81" stroke-width="0.8"/>
  <circle cx="200" cy="250" r="1.5" fill="#fde68a"/>
  <rect x="178" y="327" width="44" height="20" rx="4" fill="#0e0f12" stroke="#363636" stroke-width="0.6"/>
  <text x="200" y="341" text-anchor="middle" font-size="13" font-weight="600" fill="#dcddde">Merlin</text>

  <!-- Morgana -->
  <circle cx="660" cy="360" r="32" fill="#7d4738" stroke="#363636" stroke-width="2"/>
  <path d="M640,355 Q640,338 660,336 Q680,338 680,355 L678,378 L642,378 Z" fill="#7c3aed" opacity="0.85"/>
  <rect x="630" y="407" width="60" height="20" rx="4" fill="#0e0f12" stroke="#363636" stroke-width="0.6"/>
  <text x="660" y="421" text-anchor="middle" font-size="13" font-weight="600" fill="#dcddde">Morgana</text>

  <!-- Mordred -->
  <circle cx="360" cy="360" r="32" fill="#7a3535" stroke="#363636" stroke-width="2"/>
  <path d="M340,370 Q340,348 360,348 Q380,348 380,370 L380,378 L340,378 Z" fill="#7f1d1d"/>
  <rect x="330" y="407" width="60" height="20" rx="4" fill="#0e0f12" stroke="#363636" stroke-width="0.6"/>
  <text x="360" y="421" text-anchor="middle" font-size="13" font-weight="600" fill="#dcddde">Mordred</text>

  <!-- Gawain -->
  <circle cx="760" cy="120" r="32" fill="#467a48" stroke="#363636" stroke-width="2"/>
  <path d="M740,130 Q740,108 760,108 Q780,108 780,130 L780,138 L740,138 Z" fill="#bef264"/>
  <rect x="734" y="167" width="52" height="20" rx="4" fill="#0e0f12" stroke="#363636" stroke-width="0.6"/>
  <text x="760" y="181" text-anchor="middle" font-size="13" font-weight="600" fill="#dcddde">Gawain</text>

  <!-- === LEGEND === -->
  <g transform="translate(20, 425)">
    <rect width="880" height="28" rx="4" fill="#0e0f12" fill-opacity="0.6"/>
    <g transform="translate(20, 16)" font-size="11" fill="#999999">
      <rect x="0" y="-3" width="18" height="3" fill="#4ade80" rx="1.5"/>
      <text x="24" y="3">ally</text>
      <rect x="65" y="-3" width="18" height="3" fill="#ef4444" rx="1.5"/>
      <text x="89" y="3">enemy</text>
      <rect x="143" y="-3" width="18" height="3" fill="#fbbf24" rx="1.5"/>
      <text x="167" y="3">parent →</text>
      <line x1="232" y1="-3.5" x2="250" y2="-3.5" stroke="#ec4899" stroke-width="1.5"/>
      <line x1="232" y1="-0.5" x2="250" y2="-0.5" stroke="#ec4899" stroke-width="1.5"/>
      <text x="256" y="3">spouse ⚭</text>
      <line x1="328" y1="-1.5" x2="346" y2="-1.5" stroke="#f472b6" stroke-width="3" stroke-dasharray="6 3"/>
      <text x="352" y="3">lover</text>
      <line x1="395" y1="-1.5" x2="413" y2="-1.5" stroke="#a78bfa" stroke-width="3" stroke-dasharray="2 4"/>
      <text x="419" y="3">mentor →</text>
    </g>
  </g>
</svg>
