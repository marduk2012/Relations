name: Release

# Triggered when a tag matching a semver-ish pattern is pushed. The workflow
# builds the plugin from source, attests provenance for the release artifacts
# (main.js + styles.css), and uploads them to the GitHub release page.
#
# Attestation lets users cryptographically verify that the binary they're
# downloading was built from this repository's source at this commit, rather
# than uploaded from somewhere else. It's a recommendation from the Obsidian
# community-plugin auto-reviewer.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write       # to upload release assets
  id-token: write       # to mint the OIDC token used for attestation
  attestations: write   # to write the attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      # Version-consistency guard. The tag that triggered this workflow MUST
      # equal the version field in manifest.json. If they drift, BRAT surfaces
      # a "Version mismatch detected" warning to every user — which is what
      # happened with 0.15.1 (tag 0.15.1, manifest 0.15.0). We catch it here
      # and fail the build loudly instead of shipping a broken release.
      - name: Verify tag matches manifest.json
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version=$(node -p "require('./manifest.json').version")
          echo "Tag:              $tag"
          echo "Manifest version: $manifest_version"
          if [ "$tag" != "$manifest_version" ]; then
            echo "::error::Tag ($tag) does not match manifest.json version ($manifest_version). Bump manifest.json, package.json, and versions.json before tagging."
            exit 1
          fi

      # Same check for package.json. They should always move in lockstep, and a
      # drift here is a sign the release was prepared by hand and might be
      # missing other bumps.
      - name: Verify tag matches package.json
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Tag ($tag) does not match package.json version ($pkg_version)."
            exit 1
          fi

      # versions.json maps each released version to its minAppVersion. BRAT and
      # the Obsidian community-plugin catalogue both read it. A missing entry
      # means future users can't determine compatibility for this version.
      - name: Verify versions.json has tag entry
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          has_entry=$(node -p "Object.keys(require('./versions.json')).includes('$tag')")
          if [ "$has_entry" != "true" ]; then
            echo "::error::versions.json has no entry for $tag. Add it before tagging."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --generate-notes \
            main.js styles.css manifest.json
